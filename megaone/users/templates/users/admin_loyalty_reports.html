{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Reports - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.sidebar{background:#1e293b;min-height:100vh;padding:20px 0;border-right:1px solid rgba(255,255,255,.05)}
.sidebar a{color:#94a3b8;padding:12px 24px;display:flex;align-items:center;gap:12px;text-decoration:none;transition:.2s;font-size:14px}
.sidebar a:hover,.sidebar a.active{color:#f59e0b;background:rgba(245,158,11,.08)}
.main{padding:30px}
.stat-card{background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;text-align:center}
.stat-number{font-size:32px;font-weight:700;margin-bottom:5px}
.stat-label{color:#94a3b8;font-size:13px}
.chart-container{background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:20px}
</style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <h5 style="color:#f59e0b;padding:0 24px 20px;font-weight:700;font-size:18px"><i class="bi bi-star-fill me-2"></i>Admin</h5>
            <a href="{% url 'users:admin_dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="{% url 'users:admin_loyalty_list' %}"><i class="bi bi-star"></i> Loyalty Cards</a>
            <a href="{% url 'users:admin_loyalty_reports' %}" class="active"><i class="bi bi-graph-up"></i> Loyalty Reports</a>
        </div>
        <div class="col-md-10 main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4><i class="bi bi-graph-up me-2" style="color:#f59e0b"></i>Loyalty Reports</h4>
                <div>
                    <a href="{% url 'users:admin_export_loyalty_csv' %}" class="btn btn-success btn-sm" style="border-radius:10px"><i class="bi bi-download me-1"></i>Export CSV</a>
                    <a href="{% url 'users:admin_loyalty_list' %}" class="btn btn-outline-warning btn-sm ms-2" style="border-radius:10px"><i class="bi bi-list me-1"></i>View Cards</a>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="stat-card"><div class="stat-number" style="color:#3b82f6">{{ total_cards }}</div><div class="stat-label">Total Cards</div></div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card"><div class="stat-number" style="color:#22c55e">{{ active_cards }}</div><div class="stat-label">Active Cards</div></div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card"><div class="stat-number" style="color:#f59e0b">{{ total_earned }}</div><div class="stat-label">Points Earned</div></div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card"><div class="stat-number" style="color:#ef4444">{{ total_redeemed }}</div><div class="stat-label">Points Redeemed</div></div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <div class="chart-container">
                        <canvas id="pointsChart"></canvas>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
new Chart(document.getElementById('pointsChart'), {
    type: 'bar',
    data: {
        labels: ['Earned', 'Redeemed', 'Remaining'],
        datasets: [{
            data: [{{ total_earned }}, {{ total_redeemed }}, {{ total_remaining }}],
            backgroundColor: ['#f59e0b','#ef4444','#22c55e'],
            borderRadius: 6
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            y: { ticks: { color:'#94a3b8' }, grid: { color:'rgba(255,255,255,.05)' } },
            x: { ticks: { color:'#94a3b8' } }
        }
    }
});

new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
        labels: ['Active ({{ active_cards }})', 'Blocked ({{ blocked_cards }})'],
        datasets: [{
            data: [{{ active_cards }}, {{ blocked_cards }}],
            backgroundColor: ['#22c55e','#ef4444']
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom',
                labels: { color:'#94a3b8', padding:20 }
            }
        }
    }
});
</script>
</body>
</html>
