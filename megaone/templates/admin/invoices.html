{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Search - Restaurant Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
<style>
:root{--sidebar-w:260px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);z-index:1000;border-right:1px solid rgba(255,255,255,.05)}
.sidebar-brand{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
.sidebar-brand h4{color:#f59e0b;font-weight:700;margin:0}
.sidebar-brand small{color:#64748b;font-size:11px}
.sidebar-menu{padding:10px 0}
.sidebar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#94a3b8;text-decoration:none;transition:.2s;border-left:3px solid transparent;font-size:14px}
.sidebar-menu a i{width:20px;font-size:16px}
.sidebar-menu a:hover,.sidebar-menu a.active{background:rgba(245,158,11,.08);color:#f59e0b;border-left-color:#f59e0b}
.sidebar-menu .menu-label{padding:15px 20px 5px;font-size:11px;text-transform:uppercase;color:#475569;letter-spacing:1px;font-weight:600}
.main-content{margin-left:var(--sidebar-w);padding:20px 30px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;flex-wrap:wrap;gap:15px}
.top-bar h2{font-weight:700;font-size:24px}
.top-bar h2 span{color:#f59e0b}
.invoice-card{background:#1e293b;border-radius:16px;border:1px solid rgba(255,255,255,.05);padding:20px;transition:.3s;height:100%;position:relative;overflow:hidden}
.invoice-card:hover{transform:translateY(-4px);box-shadow:0 15px 30px rgba(0,0,0,.3);border-color:rgba(245,158,11,.3)}
.invoice-card .inv-number{font-size:16px;font-weight:700;color:#f59e0b}
.invoice-card .inv-customer{font-size:14px;color:#e2e8f0;margin:8px 0}
.invoice-card .inv-meta{font-size:12px;color:#64748b}
.invoice-card .inv-amount{font-size:22px;font-weight:700;color:#22c55e}
.status-badge{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;display:inline-block}
.status-pending{background:rgba(239,68,68,.15);color:#ef4444}
.status-preparing{background:rgba(59,130,246,.15);color:#3b82f6}
.status-ready{background:rgba(249,115,22,.15);color:#f97316}
.status-delivered{background:rgba(34,197,94,.15);color:#22c55e}
.search-box{background:#1e293b;border-radius:16px;border:1px solid rgba(255,255,255,.05);padding:24px;margin-bottom:24px}
.search-box input{background:#0f172a;border:1px solid rgba(255,255,255,.1);color:#e2e8f0;border-radius:10px;padding:12px 16px;font-size:15px}
.search-box input:focus{border-color:#f59e0b;outline:none;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.search-box input::placeholder{color:#64748b}
@media(max-width:768px){.sidebar{width:60px}.sidebar .sidebar-brand h4,.sidebar .sidebar-brand small,.sidebar .sidebar-menu a span,.sidebar .sidebar-menu .menu-label{display:none}.sidebar .sidebar-menu a{padding:12px;justify-content:center}.sidebar .sidebar-menu a i{margin:0}.main-content{margin-left:60px;padding:15px}}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <h4>Restaurant</h4>
        <small>Management System</small>
    </div>
    <div class="sidebar-menu">
        <div class="menu-label">Main</div>
        <a href="{% url 'users:admin_dashboard' %}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
        <a href="{% url 'users:product_list' %}"><i class="bi bi-box-seam"></i><span>Products</span></a>
        <a href="{% url 'users:table_list' %}"><i class="bi bi-table"></i><span>Tables</span></a>
        <a href="{% url 'users:invoice_search_page' %}" class="active"><i class="bi bi-receipt"></i><span>Invoices</span></a>
        <div class="menu-label">Operations</div>
        <a href="{% url 'users:kitchen_users_page' %}"><i class="bi bi-people"></i><span>Kitchen Users</span></a>
        <a href="{% url 'users:mysql_backup' %}"><i class="bi bi-database"></i><span>Backup</span></a>
        <div class="menu-label">Account</div>
        <a href="{% url 'users:logout' %}"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
    </div>
</div>

<div class="main-content">
    <div class="top-bar" data-aos="fade-down">
        <div>
            <h2>Invoice <span>Search</span></h2>
            <p style="color:#64748b;margin:0;font-size:14px">Search and manage all invoices</p>
        </div>
        <div>
            <a href="{% url 'users:admin_dashboard' %}" class="btn btn-sm btn-outline-warning"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </div>
    </div>

    <div class="search-box" data-aos="fade-up">
        <div class="row g-3 align-items-end">
            <div class="col-md-8">
                <label class="form-label text-muted small fw-semibold mb-2">Search by Invoice #, Email, or Name</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Type to search invoices..." oninput="doSearch()">
            </div>
            <div class="col-md-4">
                <select id="statusFilter" class="form-select" onchange="doSearch()" style="background:#0f172a;border:1px solid rgba(255,255,255,.1);color:#e2e8f0;border-radius:10px;padding:12px 16px">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="preparing">Preparing</option>
                    <option value="ready">Ready</option>
                    <option value="delivered">Delivered</option>
                </select>
            </div>
        </div>
    </div>

    <div id="invoiceGrid" class="row g-3">
        <div class="col-12 text-center py-5">
            <i class="bi bi-receipt" style="font-size:60px;color:#334155"></i>
            <p class="text-muted mt-3">Type in the search box to find invoices</p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
AOS.init({duration:800,once:true});

let searchTimer;

function doSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        const q = document.getElementById('searchInput').value.trim();
        const status = document.getElementById('statusFilter').value;
        const grid = document.getElementById('invoiceGrid');

        if (q.length < 2 && !status) {
            grid.innerHTML = `<div class="col-12 text-center py-5"><i class="bi bi-receipt" style="font-size:60px;color:#334155"></i><p class="text-muted mt-3">Type in the search box to find invoices</p></div>`;
            return;
        }

        fetch("{% url 'users:search_invoice' %}", {
            method: "POST",
            headers: {"Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}"},
            body: JSON.stringify({search: q})
        })
        .then(r => r.json())
        .then(data => {
            let invoices = data.invoices || [];
            if (invoices.length === 0) {
                grid.innerHTML = `<div class="col-12 text-center py-5"><i class="bi bi-search" style="font-size:50px;color:#334155"></i><p class="text-muted mt-3">No invoices found</p></div>`;
                return;
            }
            grid.innerHTML = '';
            invoices.forEach(inv => {
                if (status && inv.status !== status) return;
                grid.innerHTML += `
                <div class="col-xl-4 col-md-6" data-aos="fade-up">
                    <div class="invoice-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="inv-number">${inv.invoice_number}</div>
                            <span class="status-badge status-${inv.status || 'pending'}">${(inv.status || 'Pending').charAt(0).toUpperCase() + (inv.status || 'Pending').slice(1)}</span>
                        </div>
                        <div class="inv-customer"><i class="bi bi-person me-1"></i>${inv.name || 'Walk-in Customer'}</div>
                        <div class="inv-meta mb-2"><i class="bi bi-envelope me-1"></i>${inv.email || 'N/A'}</div>
                        <div class="inv-amount mb-3">Rs ${inv.total}</div>
                        <div class="d-flex gap-2">
                            <a href="/users/invoice/${inv.uuid_token}/" target="_blank" class="btn btn-sm btn-outline-warning flex-fill"><i class="bi bi-eye"></i> View</a>
                            <a href="/users/invoice/${inv.uuid_token}/" target="_blank" class="btn btn-sm btn-success flex-fill"><i class="bi bi-file-pdf"></i> PDF</a>
                        </div>
                    </div>
                </div>`;
            });
            AOS.refresh();
        });
    }, 400);
}
</script>
<script>
(function() {
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.cookie = "user_timezone=" + encodeURIComponent(tz) + "; path=/; max-age=" + (365*24*60*60);
    fetch("{% url 'users:set_timezone' %}", {
        method: "POST",
        headers: {"Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}"},
        body: JSON.stringify({timezone: tz})
    });
})();
</script>
</body>
</html>
