{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product - Restaurant Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<style>
:root{--sidebar-w:260px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);z-index:1000;border-right:1px solid rgba(255,255,255,.05)}
.sidebar-brand{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
.sidebar-brand h4{color:#f59e0b;font-weight:700;margin:0}
.sidebar-brand small{color:#64748b;font-size:11px}
.sidebar-menu{padding:10px 0}
.sidebar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#94a3b8;text-decoration:none;transition:.2s;border-left:3px solid transparent;font-size:14px}
.sidebar-menu a i{width:20px;font-size:16px}
.sidebar-menu a:hover,.sidebar-menu a.active{background:rgba(245,158,11,.08);color:#f59e0b;border-left-color:#f59e0b}
.sidebar-menu .menu-label{padding:15px 20px 5px;font-size:11px;text-transform:uppercase;color:#475569;letter-spacing:1px;font-weight:600}
.main-content{margin-left:var(--sidebar-w);padding:20px 30px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;flex-wrap:wrap;gap:15px}
.top-bar h2{font-weight:700;font-size:24px}
.top-bar h2 span{color:#f59e0b}
.form-card{background:#1e293b;border-radius:16px;border:1px solid rgba(255,255,255,.05);padding:32px;max-width:600px}
.form-card .form-label{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:6px}
.form-control{background:#0f172a;border:1px solid rgba(255,255,255,.1);color:#e2e8f0;border-radius:10px;padding:10px 14px}
.form-control:focus{border-color:#f59e0b;outline:none;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.form-select{background:#0f172a;border:1px solid rgba(255,255,255,.1);color:#e2e8f0;border-radius:10px;padding:10px 14px}
.form-check-input{background:#0f172a;border:1px solid rgba(255,255,255,.2)}
.form-check-input:checked{background:#f59e0b;border-color:#f59e0b}
.btn-action{border-radius:10px;padding:10px 24px;font-weight:600}
@media(max-width:768px){.sidebar{width:60px}.sidebar .sidebar-brand h4,.sidebar .sidebar-brand small,.sidebar .sidebar-menu a span,.sidebar .sidebar-menu .menu-label{display:none}.sidebar .sidebar-menu a{padding:12px;justify-content:center}.sidebar .sidebar-menu a i{margin:0}.main-content{margin-left:60px;padding:15px}}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <h4>Restaurant</h4>
        <small>Management System</small>
    </div>
    <div class="sidebar-menu">
        <div class="menu-label">Main</div>
        <a href="{% url 'users:admin_dashboard' %}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
        <a href="{% url 'users:product_list' %}" class="active"><i class="bi bi-box-seam"></i><span>Products</span></a>
        <a href="{% url 'users:table_list' %}"><i class="bi bi-table"></i><span>Tables</span></a>
        <a href="{% url 'users:invoice_search_page' %}"><i class="bi bi-receipt"></i><span>Invoices</span></a>
        <div class="menu-label">Account</div>
        <a href="{% url 'users:logout' %}"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
    </div>
</div>

<div class="main-content">
    <div class="top-bar" data-aos="fade-down">
        <div>
            <h2>Edit <span>Product</span></h2>
            <p style="color:#64748b;margin:0;font-size:14px">Update product details</p>
        </div>
        <div>
            <a href="{% url 'users:product_list' %}" class="btn btn-sm btn-outline-warning"><i class="bi bi-arrow-left me-1"></i> Back</a>
        </div>
    </div>

    <div class="form-card" data-aos="fade-up">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ product.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Price (Rs)</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category_id" class="form-select">
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if product.category.id == c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Image</label>
                <input type="file" name="image" class="form-control">
                {% if product.image %}
                <small class="text-muted">Current: {{ product.image.name }}</small>
                {% endif %}
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" name="available" {% if product.available %}checked{% endif %} id="availCheck">
                    <label class="form-check-label" for="availCheck">Available</label>
                </div>
            </div>
            <button type="submit" class="btn btn-warning btn-action"><i class="bi bi-check-lg me-1"></i>Update Product</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({duration:800,once:true})</script>
</body>
</html>
