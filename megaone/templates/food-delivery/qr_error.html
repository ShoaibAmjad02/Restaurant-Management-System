{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Invalid QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;}
        .error-box{max-width:500px;padding:40px;}
        .error-box h1{font-size:60px;color:#dc3545;}
        .error-box p{font-size:18px;color:#aaa;margin:20px 0;}
    </style>
</head>
<body>
    <div class="error-box">
        <h1>Invalid QR</h1>
        <p>{{ error|default:"This QR code is invalid or expired." }}</p>
        <p>Please scan a valid restaurant table QR code.</p>
        <a href="/" class="btn btn-warning mt-3">Go Home</a>
    </div>
</body>
</html>
