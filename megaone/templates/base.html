{% load static i18n %}

<!DOCTYPE html>
{% get_current_language as LANGUAGE_CODE %}
<html lang="{{ LANGUAGE_CODE }}" {% block html_attributes %}{% endblock html_attributes %}>

<head>
  <meta charset="utf-8"/>
  <meta http-equiv="x-ua-compatible" content="ie=edge"/>
  <title>{% block title %}{% endblock title %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description"
        content="2026 Restaurant. Made for Restaurant"/>
  <meta name="author" content="coderthemes"/>

  <link rel="icon" href="{% static 'demos/images/favicon.ico' %}">

  {% block css %}{% endblock css %}

</head>

<body {% block body_attributes %}{% endblock body_attributes %}>

{% block content %}{% endblock content %}

{% block modal %}{% endblock modal %}

{% block javascript %}{% endblock javascript %}

<audio id="clickSound" preload="auto">
    <source src="{% static 'audio/click.mp3' %}" type="audio/mpeg">
</audio>

<script>
(function() {
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.cookie = "user_timezone=" + encodeURIComponent(tz) + "; path=/; max-age=" + (365*24*60*60);
    fetch("{% url 'users:set_timezone' %}", {
        method: "POST",
        headers: {"Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}"},
        body: JSON.stringify({timezone: tz})
    });
})();
</script>

<script>
document.body.addEventListener("click", function(){
    var s = document.getElementById("clickSound");
    if(s){ s.load(); }
}, {once:true});

document.addEventListener("click", function(event){
    var clickable = event.target.closest("button, a, .btn, input[type='button'], input[type='submit'], .card, .dropdown-item");
    if(!clickable) return;
    var clickSound = document.getElementById("clickSound");
    if(clickSound){
        clickSound.volume = 0.5;
        clickSound.currentTime = 0;
        clickSound.play().catch(function(error){
            console.log("Click sound blocked:", error);
        });
    }
});
</script>
</body>
</html>
